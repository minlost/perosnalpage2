<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" shape-rendering="crispEdges">
  <rect width="24" height="24" fill="#000000"/>
  <!-- antenna -->
  <rect x="11" y="2" width="2" height="4" fill="#ffffff"/>
  <rect x="9" y="1" width="6" height="2" fill="#ffffff"/>
  <!-- head -->
  <rect x="4" y="6" width="16" height="11" fill="#ffffff"/>
  <!-- single eye socket -->
